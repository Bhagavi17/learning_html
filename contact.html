<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Smart Mobile Shop</title>
</head>
<body>

    <!-- Header -->
    <header>
        <nav>
            <a href="index.html">Home</a> |
            <a href="about.html">About</a> |
            <a href="products.html">Products</a> |
            <a href="contact.html">Contact</a> |
            <a href="services.html">Services</a> |
            <a href="https://www.facebook.com" target="_blank">Facebook</a>
        </nav>
    </header>

    <hr>

    <main>

        <h1>Contact Smart Mobile Shop</h1>

        <form>

            <!-- Customer Name -->
            <label>Full Name:</label>
            <input type="text" placeholder="Enter Your Name" required>
            <br><br>

            <!-- Email -->
            <label>Email ID:</label>
            <input type="email" placeholder="Enter Your Email" required>
            <br><br>

            <!-- Mobile Number -->
            <label>Mobile Number:</label>
            <input type="tel" placeholder="Enter Mobile Number" required>
            <br><br>

            <!-- Product -->
            <label>Product Name:</label>
            <input type="text" placeholder="Enter Mobile Name">
            <br><br>

            <!-- Service -->
            <label>Service Required:</label>
            <select>
                <option>Select</option>
                <option>Buy Mobile</option>
                <option>Mobile Repair</option>
                <option>Accessories</option>
                <option>Exchange Offer</option>
            </select>

            <br><br>

            <!-- Message -->
            <label>Message:</label><br>
            <textarea rows="5" cols="40" placeholder="Enter Your Message"></textarea>

            <br><br>

            <input type="submit" value="Submit">
            <input type="reset" value="Reset">

        </form>

    </main>

</body>
</html>
